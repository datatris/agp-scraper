name: AGP Scraper Daily

on:
  schedule:
    - cron: "0 4 * * *"    # 06:00 MESZ
    - cron: "0 7 * * *"    # 09:00 MESZ
    - cron: "0 8 * * *"    # 10:00 MESZ
    - cron: "0 14 * * *"   # 16:00 MESZ
    - cron: "30 18 * * *"  # 20:30 MESZ
    - cron: "30 19 * * *"  # 21:30 MESZ
    - cron: "30 21 * * *"  # 23:30 MESZ
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python script.py
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}

      - name: Commit JSON to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add spieltage.json gesamtstand.json tipprunde.json
          git commit -m "daily update" || exit 0
          git push
